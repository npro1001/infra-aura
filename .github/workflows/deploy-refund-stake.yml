name: Deploy Refund Stake

on:
  push:
    branches: [main]
    paths:
      - "cloud_run_functions/refund-stake/**"
      - ".github/workflows/deploy-refund-stake.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloud Functions

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy refund-stake to Cloud Functions
        run: |
          gcloud functions deploy refund-stake \
            --gen2 \
            --source ./cloud_run_functions/refund-stake \
            --entry-point refund_stake \
            --runtime python312 \
            --region us-central1 \
            --trigger-http \
            --memory 256MiB \
            --timeout 30s \
            --service-account ${{ secrets.GCP_SERVICE_ACCOUNT }} \
            --max-instances 5 \
            --set-secrets="DATABASE_URL=projects/${{ secrets.GCP_PROJECT_ID }}/secrets/aura-database-url:latest,STRIPE_SECRET_KEY=projects/${{ secrets.GCP_PROJECT_ID }}/secrets/aura-stripe-secret-key:latest" \
            --allow-unauthenticated
